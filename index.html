<!DOCTYPE html>
<html>
<head>
    <title>Meu Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin:0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align:center;
        }

        .container {
            padding:50px 20px;
        }

        h1 {
            font-size:42px;
        }

        p {
            opacity:0.8;
        }

        .btn {
            display:inline-block;
            padding:15px 30px;
            margin-top:40px;
            color:#2a6e37;
            border:2px solid white;
            border-radius:12px;
            text-decoration:none;
            box-shadow:0 6px 15px rgba(0,0,0,0.4);
            background: rgba(0,255,120,0.1);
            transition:0.3s;
        }

        .btn:hover {
            background: rgba(0,255,120,0.3);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Bem-vindo 🚀</h1>
    <p>O meu site hospedado no GitHub</p>

    <a class="btn" href="https://photos.google.com" target="_blank">
        📷 Adicionar Fotos
    </a>
</div>

</body>
</html>
